<style>
:root{
  --orange:#E8580A;--orange-l:#FF6B1A;--orange-p:#FFF3EC;
  --navy:#0D1B2A;--navy-m:#1A2D42;--navy-l:#243B55;
  --white:#FFFFFF;--off:#F8F7F4;--border:#E2DDD6;--muted:#8A8680;--text:#1A1410;
  --ef:#E8F5EE;--eg:#1A7A4A;--uf:#FFF3E0;--ug:#B85C00;--gf:#EDE7F6;--gg:#5C35A0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);-webkit-font-smoothing:antialiased;}
.hdr{background:#F5F0E8;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--orange);}
.logo img{height:44px;width:auto;display:block;}
.hdr-r{display:flex;align-items:center;gap:24px;}
.upd{font-size:11px;color:#8A8680;font-family:'DM Mono',monospace;}
.upd span{color:var(--orange);}
.hero{background:linear-gradient(135deg,var(--navy-m),var(--navy-l));padding:28px 40px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:white;letter-spacing:3px;line-height:1;}
.hero-title span{color:var(--orange-l);}
.hero-desc{font-size:12px;color:rgba(255,255,255,0.55);margin-top:6px;letter-spacing:0.5px;}
.stats{display:flex;gap:32px;}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--orange-l);line-height:1;}
.stat-l{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.ctrl{background:white;border-bottom:1px solid var(--border);padding:14px 40px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:64px;z-index:90;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.sw{position:relative;flex:1;min-width:200px;max-width:320px;}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
.sinput{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;background:var(--off);}
.sinput:focus{border-color:var(--orange);background:white;}
.fsel{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--off);outline:none;cursor:pointer;}
.fsel:focus{border-color:var(--orange);}
.rcnt{margin-left:auto;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;}
.tw{padding:24px 40px 60px;}
.cb{margin-bottom:32px;}
.cl{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ci{font-size:18px;}
.cn{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--navy);}
.cc{font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:20px;}
.cline{flex:1;height:1px;background:var(--border);}
table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06),0 0 0 1px var(--border);}
thead tr{background:var(--navy);}
th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.6);white-space:nowrap;font-family:'DM Mono',monospace;}
th.r{text-align:right;}th.c{text-align:center;}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--orange-p);}
td{padding:9px 14px;font-size:13px;vertical-align:middle;}
.pn{font-weight:600;color:var(--navy);white-space:nowrap;}
.at{display:inline-block;background:#E8EDFF;color:#3A4A8C;font-size:9px;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle;}
.mo{font-family:'DM Mono',monospace;font-size:12px;}
.pb{color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;text-align:right;}
.pc{font-weight:700;color:var(--orange);font-size:14px;font-family:'DM Mono',monospace;text-align:right;}
.ct{font-size:10px;font-weight:600;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:5px;display:inline-block;}
.eur{background:var(--ef);color:var(--eg);}
.usd{background:var(--uf);color:var(--ug);}
.gbp{background:var(--gf);color:var(--gg);}
.ic{font-size:12px;color:var(--muted);}
.lf{font-size:12px;color:#1A7A4A;font-weight:500;}
.la{font-size:12px;color:var(--orange);}
.lw{font-size:12px;color:var(--muted);}
.ld{font-size:12px;color:#CCC;}
.eb{background:var(--orange);color:white;border:none;padding:6px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.eb:hover{background:var(--orange-l);transform:translateY(-1px);box-shadow:0 4px 12px rgba(232,88,10,.3);}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.ov{position:fixed;inset:0;background:rgba(13,27,42,.7);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.mo2{background:white;border-radius:16px;width:100%;max-width:520px;box-shadow:0 24px 80px rgba(0,0,0,.25);overflow:hidden;}
.mh{background:var(--navy);padding:20px 24px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.mt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:white;}
.ms{font-size:12px;color:var(--orange-l);margin-top:2px;font-family:'DM Mono',monospace;}
.mx{background:rgba(255,255,255,.1);border:none;color:white;width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.mx:hover{background:rgba(255,255,255,.2);}
.mb{padding:24px;}
.ps{background:var(--off);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;}
.pl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-family:'DM Mono',monospace;}
.pv{font-size:13px;font-weight:600;color:var(--navy);}
.pv.gd{color:var(--orange);font-family:'DM Mono',monospace;font-size:15px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.fg3{display:flex;flex-direction:column;gap:5px;}
.fg3.full{grid-column:1/-1;}
.fl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--navy);}
.fi,.fta{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;background:var(--off);}
.fi:focus,.fta:focus{border-color:var(--orange);background:white;}
.fta{resize:vertical;min-height:70px;}
.mf{padding:0 24px 24px;display:flex;gap:10px;justify-content:flex-end;}
.bc{padding:10px 20px;border:1.5px solid var(--border);border-radius:8px;background:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);}
.bc:hover{border-color:var(--navy);color:var(--navy);}
.bs{padding:10px 24px;background:var(--orange);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;color:white;cursor:pointer;}
.bs:hover{background:var(--orange-l);}
.bs:disabled{opacity:.6;cursor:not-allowed;}
.succ{padding:40px 24px;text-align:center;}
.si2{width:60px;height:60px;background:#E8F5EE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;}
.stit{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--navy);margin-bottom:8px;}
.smsg{font-size:13px;color:var(--muted);line-height:1.6;}
.sref{font-family:'DM Mono',monospace;font-size:11px;color:var(--orange);margin-top:12px;}
.bd{margin-top:20px;padding:10px 28px;background:var(--navy);border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:white;cursor:pointer;}
.foot{background:var(--navy);color:rgba(255,255,255,.4);text-align:center;padding:20px 40px;font-size:11px;letter-spacing:.5px;line-height:1.8;}
.foot span{color:var(--orange-l);}
@media(max-width:768px){
  .hdr,.hero,.ctrl,.tw{padding-left:16px;padding-right:16px;}
  .hdr-r .upd{display:none;}
  th:nth-child(3),td:nth-child(3),th:nth-child(4),td:nth-child(4),th:nth-child(9),td:nth-child(9){display:none;}
  .fg2{grid-template-columns:1fr;}
}
</style>
</head>

let modal=null,search="",catF="",curF="";

function lc(l){
  if(!l||l==="—"||l==="None")return "ld";
  const ll=l.toLowerCase();
  if(ll.includes("floor")||ll.includes("stock"))return "lf";
  if(ll.includes("arriv")||ll.includes("july")||ll.includes("june"))return "la";
  return "lw";
}

function filtered(){
  const q=search.toLowerCase();
  return DATA.filter(d=>
    (!q||d.p.toLowerCase().includes(q)||(d.age&&d.age.toLowerCase().includes(q))||d.sz.toLowerCase().includes(q))&&
    (!catF||d.cat===catF)&&(!curF||d.cur===curF)
  );
}

function openModal(idx){modal=DATA[idx];render();}
function closeModal(){modal=null;render();}

function doSubmit(){
  const qty=document.getElementById("qty")?.value;
  const dest=document.getElementById("dest")?.value;
  const date=document.getElementById("date")?.value||"";
  const notes=document.getElementById("notes")?.value||"";
  if(!qty||!dest){alert("Please fill in quantity and destination.");return;}
  const ref="ENQ-"+Date.now().toString(36).toUpperCase();
  const it=modal;
  const sub=encodeURIComponent("Enquiry — "+it.p+(it.age?" "+it.age:"")+" "+it.sz+" · "+ref);
  const body=encodeURIComponent(
    "ORANGE LINK FZE — TRADE ENQUIRY\n"+
    "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n"+
    "Reference: "+ref+"\n\n"+
    "PRODUCT\nProduct  : "+it.p+(it.age?" "+it.age:"")+"\n"+
    "Size     : "+it.sz+"\nConfig   : "+it.cfg+"\n"+
    "Currency : "+it.cur+"\nPrice/cs : "+it.cur+" "+(it.pcs?it.pcs.toFixed(2):"—")+"\n"+
    "Incoterm : "+it.inc+" "+it.loc+"\n\n"+
    "REQUIREMENTS\nQuantity : "+qty+" cases\n"+
    "Dest.    : "+dest+"\nDelivery : "+(date||"Flexible")+"\n"+
    "Notes    : "+(notes||"—")+"\n"+
    "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  );
  window.location.href="mailto:trading@orange-link.com?subject="+sub+"&body="+body;
  modal={...it,_sent:true,_ref:ref};
  render();
}

          <div class="stit">We've received your enquiry</div>
          <p class="smsg">Our team will review your requirements and revert shortly with pricing and availability confirmation.</p>
          <div class="sref">${modal._ref}</div>
          <button class="bd" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>`;
